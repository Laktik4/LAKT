<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recenze</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-glow"></div>

<div class="reviews-container">

    <h1 class="reviews-title">Recenze zákazníků</h1>
    <p class="reviews-subtitle">Důvěra a spokojenost mých zákazníků</p>

    <div class="reviews-grid" id="gallery">

        <!-- Главная фотография -->
        <div class="review-item main-review">
            <img src="images/review12.jpg">
        </div>

        <!-- Остальные фото будут подгружены через JS -->

    </div>

    <a href="index.html" class="back-button">← Zpět</a>

</div>

<!-- MODAL -->
<div id="imageModal" class="image-modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img id="modalImg">
    <div class="nav prev" onclick="prevImage()">&#10094;</div>
    <div class="nav next" onclick="nextImage()">&#10095;</div>
</div>

<script src="script.js"></script>
</body>
</html>
